<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Arts & Animation Terminology Glossary</title>
  <meta name="description" content="Searchable terminology glossary for 3D Arts & Animation terms." />
  <link rel="icon" href="https://awelchmatc.github.io/html-embeds/MADLogo.png"/>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <img class="brand-icon" src="https://awelchmatc.github.io/html-embeds/MADLogo.png" alt="Site icon" />
        <div>
          <h1>3D Arts & Animation <strong>Terminology Glossary</strong></h1>
          <small>Madison College · Student Resource</small>
        </div>
      </div>
      <div class="controls" role="search">
        <input id="q" type="search" placeholder="Search terms, tags, definitions…" aria-label="Search glossary" />
        <select id="category" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="chips" aria-label="Quick filters by track">
        <span class="chip" data-tag="3D Art Track"><span class="dot"></span>3D Art Track</span>
        <span class="chip" data-tag="Animation Track"><span class="dot"></span>Animation Track</span>
        <span class="chip" data-tag="Common Core"><span class="dot"></span>Common Core</span>
      </div>
      <div id="results-count" aria-live="polite">Loading…</div>
    </div>
  </header>

  <main class="container">
    <!-- A–Z list renders here -->
    <div id="az"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <div>© <span id="year"></span> Madison College · 3D Arts & Animation · Terminology Glossary</div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
