<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Term · 3D Arts & Animation Terminology Glossary (Instructor)</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#0f1216;--panel:#151a21;--text:#e7edf3;--muted:#9fb0c3;
      --accent:#4cc2ff;--good:#7bffb7;--warn:#ffcf5b;--border:#263040
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,"Noto Sans","Liberation Sans",sans-serif;
      background:var(--bg);color:var(--text)
    }
    a{color:var(--accent)}
    .wrap{max-width:960px;margin:0 auto;padding:24px}
    header{display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:18px}
    header img{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:#0b0e12;object-fit:contain}
    h1{font-size:1.25rem;margin:0}

    .panel{background:#151a21;border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px}
    .row{display:grid;grid-template-columns:180px 1fr;gap:12px;align-items:start;margin:10px 0}
    .row label{color:var(--muted);padding-top:8px}
    input[type=text],textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#0d1218;color:var(--text)}
    textarea{min-height:90px;resize:vertical}
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{background:var(--accent);color:#062638;border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    button.secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
    button.good{background:var(--good);color:#0b3726}
    button.warn{background:var(--warn);color:#3a2b00}

    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:#19212b;border:1px solid var(--border);color:var(--text);cursor:pointer;user-select:none}
    .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--good)}
    .chip.active{outline:2px solid var(--accent);background:#0f1720}

    .small{color:var(--muted);font-size:.9rem}
    pre{white-space:pre-wrap;background:#0b0e12;border:1px solid var(--border);border-radius:10px;padding:10px;color:#bfe0ff}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="https://awelchmatc.github.io/html-embeds/MADLogo.png" alt="icon">
      <div>
        <h1>Instructor Tool · Add Term to <strong>Terminology Glossary</strong></h1>
        <div class="small">Use the buttons below to paste straight into GitHub with correct commas & indentation.</div>
      </div>
    </header>

    <section class="panel" style="margin-top:0">
      <h2 style="margin:0 0 10px 0">1) Term details</h2>
      <div class="row">
        <label for="title">Title</label>
        <input id="title" type="text" placeholder="e.g., Subsurface Scattering" />
      </div>
      <div class="row">
        <label for="slug">Slug</label>
        <input id="slug" type="text" placeholder="auto-generated from Title" />
      </div>
      <div class="row">
        <label for="category">Category</label>
        <input id="category" type="text" placeholder="e.g., Materials, Modeling, Animation, Lighting, Texturing" />
      </div>
      <div class="row">
        <label>Track tags</label>
        <div>
          <div class="chips">
