  <link rel="icon" href="https://awelchmatc.github.io/html-embeds/MADLogo.png">

  <style>
    :root {
      --primary: #005a8b;
      --accent: #00a6a6;
      --background: #f6f8fa;
      --text: #1f2933;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    img.logo {
      width: 80px;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0.5rem 0 0.25rem;
      font-size: 1.75rem;
    }

    p.subtitle {
      margin: 0 0 2rem;
      color: #555;
    }

    a.button {
      display: block;
      text-decoration: none;
      color: white;
      background: var(--primary);
      padding: 0.9rem;
      margin: 0.75rem 0;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    a.button.secondary {
      background: var(--accent);
    }

    a.button:hover {
      opacity: 0.9;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #777;
    }
  </style>
</head>
